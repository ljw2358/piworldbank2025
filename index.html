        /* 메인 자산 디스플레이 */

        .info-card { background: var(--hk-card); border: 1px solid #222; padding: 20px 10px; border-radius: 20px; }
        .info-label { font-size: 13px; color: #888; font-weight: 800; margin-bottom: 10px; display: block; }
        .info-val { font-size: 24px; font-weight: 900; color: #fff; }

        /* 공급량 및 유동성 */
        .supply-section { background: linear-gradient(145deg, #0a0a0a, #111); padding: 25px; border-radius: 25px; margin: 15px 0; border: 1px solid #222; position: relative; overflow: hidden; }
        .supply-section::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--hk-blue), transparent 30%); animation: rotate 4s linear infinite; opacity: 0.1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .liq-card { border: 2.5px solid; border-image: linear-gradient(45deg, var(--hk-green), var(--hk-gold)) 1; background: rgba(255,255,255,0.03); padding: 30px 20px; margin: 20px 0 40px 0; }

        .section-val { font-size: 34px; font-weight: 900; }

        .top-btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }

        .top-btn:active { transform: scale(0.95); }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 45px; }
        .menu-item { background: #111; padding: 25px 0; border-radius: 24px; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { border-color: var(--hk-gold); }
        .menu-icon { font-size: 28px; margin-bottom: 12px; display: block; }
        .menu-text { font-size: 14px; font-weight: 800; color: #fff; }

        /* FAQ & VISION */
        .big-btn { width: 100%; padding: 25px; border-radius: 22px; font-size: 20px; font-weight: 900; color: #fff; border: none; margin-bottom: 15px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .panel { display: none; background: #0a0a0a; border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid #333; text-align: left; }
        .faq-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .faq-q { color: var(--hk-gold); font-weight: 900; font-size: 16px; margin-bottom: 8px; line-height: 1.4; }
        .faq-a { color: #bbb; font-size: 14px; line-height: 1.7; }
        .vision-content { line-height: 2; font-size: 15px; }
        .vision-content b { color: var(--hk-blue); font-size: 17px; }
        .vision-item { margin-bottom: 25px; padding-left: 10px; border-left: 3px solid var(--hk-blue); }

        /* 챗봇 레이어 */
        #chat-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; }
        .chat-top { padding: 30px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg-box { max-width: 85%; padding: 15px; border-radius: 20px; font-size: 15px; line-height: 1.5; }
        .msg-bbini { background: var(--hk-pink); color: #fff; align-self: flex-start; }
        .msg-user { background: #222; color: #fff; align-self: flex-end; }
        .chat-footer { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        .chat-in { flex: 1; background: #111; border: 1.5px solid #333; border-radius: 50px; padding: 15px 25px; color: #fff; outline: none; }
        .bbini { position: fixed; bottom: 35px; right: 30px; width: 85px; height: 85px; background: linear-gradient(135deg, var(--hk-pink), #800080); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; border: 4px solid #fff; animation: bounce 2s infinite; cursor: pointer; z-index: 1000; box-shadow: 0 0 30px rgba(255,0,255,0.4); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    </style>
</head>

        ["테스트 파이 연동은 어떻게 진행되나요?", "형님의 지갑과 Pi SDK를 통해 직접 연결되며, 실시간으로 체인 데이터와 동기화되어 실제 메인넷과 동일한 환경에서 구동됩니다."],

        document.getElementById('pi-val').innerHTML = p.toFixed(7) + " <span>Pi</span>";
        document.getElementById('gcv-val').innerText = "Value: $ " + g.toLocaleString() + " (GCV)";
        document.getElementById('liq-val').innerText = "$ " + l.toLocaleString();
    }, 800);

    function renderFAQ() {
        const list = document.getElementById('faq-list'); list.innerHTML = "";
        rawFaqs.forEach((f, i) => { list.innerHTML += `<div class="faq-item"><div class="faq-q">${i+1}. ${f[0]}</div><div class="faq-a">${f[1]}</div></div>`; });
    }
    function renderVision() {
        const list = document.getElementById('vision-list'); list.innerHTML = "";
        visions.forEach(v => { list.innerHTML += `<div class="vision-item"><b>${v[0]}</b><br>${v[1]}</div>`; });
    }
    function changeLanguage() {
        const lang = document.getElementById('lang-selector').value;
        const set = i18n[lang] || i18n['en'];
        document.getElementById('chat-welcome').innerText = set.welcome || "안녕하세요? 무엇을 도와드릴까요?";
        document.getElementById('txt-title').innerText = set.title || "HK WORLD BANK";
    }
    function toggle(id) {
        const p = document.getElementById(id);
        const isV = p.style.display === 'block';
        document.querySelectorAll('.panel').forEach(panel => panel.style.display = 'none');
        p.style.display = isV ? 'none' : 'block';
    }
    function openChat() { document.getElementById('chat-window').style.display = 'flex'; }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function sendMsg() {
        const input = document.getElementById('chat-in'); if(!input.value) return;
        const resBox = document.getElementById('chat-res');
        resBox.innerHTML += `<div class="msg-box msg-user">${input.value}</div>`;
        setTimeout(() => {
            resBox.innerHTML += `<div class="msg-box msg-bbini">AGI가 형님의 명령을 Test-Pi 노드에 전달하고 있습니다.</div>`;
            resBox.scrollTop = resBox.scrollHeight;
        }, 600);
        input.value = "";
    }

    renderFAQ(); renderVision();
</script>
</body>
</html>
